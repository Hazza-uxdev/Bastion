<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width:260px; background:#161616; color:#E8E8E8; font-family:Segoe UI,sans-serif; margin:0; }
  .header { background:#141414; padding:14px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #222; }
  .logo { background:linear-gradient(135deg,#7C3AED,#4C1D95); border-radius:6px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-size:14px; }
  h1 { margin:0; font-size:14px; font-weight:600; }
  .status { padding:14px 16px; font-size:13px; color:#777; }
  .status.ok  { color:#4ADE80; }
  .status.err { color:#EF4444; }
  .hint { font-size:11px; color:#444; padding:0 16px 16px; line-height:1.5; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">🔒</div>
  <h1>Bastion Autofill</h1>
</div>
<div class="status" id="status">Checking connection…</div>
<p class="hint">Make sure Bastion is running. The extension connects automatically — no setup needed.</p>
<script src="popup.js"></script>
</body>
</html>
